kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: gwells-frontend
  generation: 15
  namespace: 26e83e-tools
  labels:
    appver: gwells
spec:
  nodeSelector: null
  output:
    to:
      kind: ImageStreamTag
      name: "gwells-application:latest"
  resources:
    limits:
      cpu: "2"
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 4Gi
  successfulBuildsHistoryLimit: 3
  failedBuildsHistoryLimit: 3
  strategy:
    type: Docker
    dockerStrategy:
      env:
        - name: BUILD_LOGLEVEL
          value: "4"
        - name: PIP_INDEX_URL
        - name: UPGRADE_PIP_TO_LATEST
          value: "true"
        - name: JWT_PUBLIC_KEY
          value: '-----BEGIN PUBLIC KEY-----\\n-----END PUBLIC KEY-----'
        - name: JWT_AUDIENCE
          value: webapp-dev-local
      dockerfilePath: Dockerfile
  postCommit: {}
  source:
    type: Git
    git:
      uri: "https://www.github.com/bcgov/gwells.git"
      ref: release
    contextDir: app/frontend
  triggers:
    - type: ConfigChange
    - type: GitHub
      github:
        secretReference:
          name: github-build-webhook
  runPolicy: SerialLatestOnly
status:
  lastVersion: 15
